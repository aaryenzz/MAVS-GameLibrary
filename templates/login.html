<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAVS Game Library </title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS for layout/utilities -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Google Sans', sans-serif;
            background-image: url('/static/LoginWallpaper.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #e1a0ff;

            /* Clean light gray */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: linear-gradient(rgb(168, 121, 255), rgb(101, 64, 189));
            border-radius: 24px;
            color: white;

            /* Stitch Large Radius */
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.03);

            /* Elevated */
        }

        .login-card .text-muted {
            color: white !important;
            /* Override bootstrap's text-muted class inside the card */
        }

        .btn-primary {
            background-color: #6200ff;
            /* Primary Blue */
            border: none;
            border-radius: 20px;
            padding: 0.5rem 1.5rem;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #4400ff;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            background-color: #f1f3f4;
            border: 1px solid transparent;
        }

        .form-control:focus {
            background-color: white;
            border-color: #1a73e8;
            box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.25);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h3 class="text-center mb-4 fw-bold">MAVS Game Library</h3>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-danger" style="border-radius: 12px;">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form action="{{ url_for('login') }}" method="post">
            <div class="mb-3">
                <label class="form-label ms-1 text-muted small fw-medium">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label ms-1 text-muted small fw-medium">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Sign in</button>
        </form>
        <div class="mt-4 text-center text-muted small">

            <!-- <p class="mb-1">Admin Demo: <strong>admin</strong> / <strong>dihhmons@1234</strong></p> -->
            <p class="mb-0">User Demo: <strong>user</strong> / <strong>user</strong></p>
        </div>
    </div>

</body>

</html>
