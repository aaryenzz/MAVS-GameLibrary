<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contributors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      opacity: 0;
      animation: fadeInPage 1s forwards;
    }

    @keyframes fadeInPage {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .container {
      display: flex;
      height: 100%;
    }

    .thumbs {
      display: flex;
      flex: 1;
      width: 100%;
      overflow-x: auto;
    }

    .thumb {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: flex 0.4s ease, transform 0.4s ease;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter 0.3s ease, transform 0.3s ease;
    }

    /* Hover grow + color effect for ALL images */
    .thumb:hover {
      flex: 12;
      /* large flex to take ~75% width */
      transform: scale(1.02);
      z-index: 2;
    }

    .thumb:hover img {
      filter: grayscale(0);
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.5rem 1rem;
      border-radius: 10px;
    }

    .overlay h3 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .overlay p {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .thumb:hover .overlay {
      opacity: 1;
      transform: translateX(-50%) translateY(-5px);
    }

    /* DESKTOP ONLY */
    @media (min-width: 769px) {
      .thumb:hover {
        flex: 1.5;
        /* desktop hover growth */
        transform: scale(1.02);
        z-index: 2;
      }

      .thumb:hover img {
        filter: grayscale(0);
        transform: scale(1.05);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="thumbs">
      <div class="thumb">
        <img src="{{ url_for('static', filename='images/WhatsApp Image 2025-09-14 at 12.23.44 AM.jpeg') }}"
          alt="Aaryan Jayachandran">
        <div class="overlay">
          <h3>Aaryan Jayachandran</h3>
          <p>Backend Engineer</p>
        </div>
      </div>
      <div class="thumb">
        <img style="object-position: center top;"
          src="{{ url_for('static', filename='images/WhatsApp Image 2026-03-01 at 4.39.38 PM.jpeg') }}" alt="Adarsh KP">
        <div class="overlay">
          <h3>Adarsh KP</h3>
          <p>Frontend Developer(UI/UX)</p>
        </div>
      </div>
      <div class="thumb">
        <img src="{{ url_for('static', filename='images/WhatsApp Image 2026-03-01 at 4.29.34 PM.jpeg') }}"
          alt="Albin PO">
        <div class="overlay">
          <h3>Albin PO</h3>
          <p>Frontend Developer (HTML/CSS)</p>
        </div>
      </div>
      <div class="thumb">
        <img src="{{ url_for('static', filename='images/WhatsApp Image 2026-03-01 at 4.57.20 PM.jpeg') }}"
          alt="Adarsh KS">
        <div class="overlay">
          <h3>Adarsh KS</h3>
          <p>Project Management & Test Engineer</p>
        </div>
      </div>
      <div class="thumb">
        <img src="{{ url_for('static', filename='images/WhatsApp Image 2026-03-01 at 4.28.36 PM.jpeg') }}"
          alt="Alon Pious">
        <div class="overlay">
          <h3>Alon Pious</h3>
          <p>DevOps / Deployment Engineer</p>
        </div>
      </div>
      <div class="thumb">
        <img src="{{ url_for('static', filename='images/WhatsApp Image 2026-03-01 at 4.33.20 PM.jpeg') }}"
          alt="Adith T Dinil">
        <div class="overlay">
          <h3>Adith T Dinil</h3>
          <p>Database Engineer</p>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
